<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIHub - AI 应用</title>
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #e8eefb;
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --line: rgba(107, 123, 152, 0.16);
      --text: #0f1728;
      --muted: #677489;
      --primary: #3a7bff;
      --shadow: 0 14px 34px rgba(28, 40, 68, 0.10);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --top-h: 68px;
      --left-w: 230px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 620px at -8% -10%, rgba(158, 196, 255, 0.42), transparent 56%),
        radial-gradient(980px 560px at 105% -18%, rgba(204, 182, 255, 0.30), transparent 58%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: var(--top-h) minmax(0, 1fr);
      gap: 14px;
      padding: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      padding: 10px 14px;
    }

    .top-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .search {
      width: min(420px, 45vw);
      min-width: 140px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(124, 138, 164, 0.22);
      background: rgba(255, 255, 255, 0.72);
      color: #344054;
      font-size: 14px;
      padding: 0 14px;
      outline: none;
    }

    .search:focus {
      border-color: rgba(47, 107, 255, 0.36);
      box-shadow: 0 0 0 3px rgba(47, 107, 255, 0.12);
    }

    .hero-chip {
      justify-self: center;
      border: 1px solid rgba(99, 115, 142, 0.2);
      background: rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: #344054;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 46vw;
    }

    .top-right {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill {
      border: 1px solid rgba(47, 107, 255, 0.26);
      border-radius: 999px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      color: #1f4fd1;
      background: rgba(255, 255, 255, 0.85);
      font-weight: 600;
    }

    .icon-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(123, 136, 162, 0.24);
      background: rgba(255, 255, 255, 0.85);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--left-w) minmax(0, 1fr);
      gap: 14px;
    }

    .sidebar {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      min-height: 0;
      overflow: auto;
    }

    .side-group { display: grid; gap: 6px; }

    .item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: #475467;
      font-size: 14px;
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      transition: .15s ease;
    }

    .item:hover {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(123, 136, 162, 0.18);
    }

    .item.active {
      color: #12358f;
      border-color: rgba(47, 107, 255, 0.24);
      background: linear-gradient(145deg, rgba(210, 227, 255, 0.82), rgba(233, 240, 255, 0.92));
      font-weight: 600;
    }

    .workspace-btn {
      margin-top: 10px;
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: #475467;
      font-size: 13px;
      padding: 10px 0;
      text-align: center;
    }

    .main { min-width: 0; min-height: 0; overflow: auto; padding: 4px; }

    .section {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass-strong);
      backdrop-filter: blur(16px) saturate(128%);
      -webkit-backdrop-filter: blur(16px) saturate(128%);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.1px; }
    .apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
    .recommend-grid { grid-template-columns: minmax(260px, 380px); justify-content: start; }

    .mini-card {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.82);
      min-height: 94px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      padding: 12px 12px 12px 14px;
    }

    .clickable {
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .clickable:hover {
      transform: translateY(-1px);
      border-color: rgba(47, 107, 255, 0.25);
      box-shadow: 0 10px 24px rgba(18, 44, 96, 0.14);
    }

    .mini-card h4 { margin: 0; font-size: 18px; font-weight: 700; color: #101828; line-height: 1.2; }
    .mini-card p { margin: 6px 0 0; font-size: 13px; color: #667085; line-height: 1.35; }

    .thumb {
      width: 86px;
      height: 62px;
      border-radius: 12px;
      border: 1px solid rgba(123, 136, 162, 0.2);
      overflow: hidden;
      background: #edf2ff;
      flex-shrink: 0;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

    .tag {
      border: 1px solid rgba(123, 136, 162, 0.22);
      background: rgba(255, 255, 255, 0.8);
      color: #667085;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      transition: .15s ease;
    }

    .tag.active {
      color: #1748bf;
      border-color: rgba(47, 107, 255, 0.28);
      background: rgba(222, 234, 255, 0.9);
      font-weight: 600;
    }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; }

    .card {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
    }

    .cover { aspect-ratio: 3 / 4; background: #eef3ff; overflow: hidden; }
    .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .meta { padding: 10px; font-size: 13px; color: #475467; line-height: 1.3; font-weight: 600; }

    .empty-pane {
      min-height: 230px;
      border: 1px dashed rgba(123, 136, 162, 0.32);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5);
    }

    .mock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .mock-card {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      padding: 14px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .mock-card:hover {
      transform: translateY(-1px);
      border-color: rgba(47, 107, 255, 0.24);
      box-shadow: 0 10px 24px rgba(18, 44, 96, 0.14);
    }

    .mock-card.active {
      border-color: rgba(47, 107, 255, 0.34);
      background: linear-gradient(145deg, rgba(214, 229, 255, 0.88), rgba(238, 244, 255, 0.95));
    }

    .mock-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #101828;
    }

    .mock-card-desc {
      font-size: 13px;
      color: #667085;
      line-height: 1.4;
    }

    .mock-panel {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      padding: 14px;
    }

    .mock-panel h4 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .mock-panel p {
      margin: 0;
      font-size: 14px;
      color: #475467;
      line-height: 1.45;
    }

    .mock-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mock-btn {
      border: 1px solid rgba(47, 107, 255, 0.26);
      border-radius: 999px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      color: #1f4fd1;
      background: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      cursor: pointer;
    }

    .hidden { display: none !important; }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 88px minmax(0, 1fr); }
      .item { font-size: 12px; padding: 10px 8px; }
      .workspace-btn { font-size: 12px; }
    }

    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { grid-template-columns: 1fr; gap: 8px; }
      .hero-chip { justify-self: start; max-width: 100%; }
      .top-right { justify-self: start; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { flex-direction: row; overflow-x: auto; gap: 10px; align-items: center; }
      .side-group { display: flex; gap: 6px; }
      .workspace-btn { display: none; }
    }

    @media (max-width: 520px) {
      .brand { display: none; }
      .search { width: 100%; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="top-left">
        <div class="brand">AIHub</div>
        <input class="search" v-model="searchText" />
      </div>
      <div class="hero-chip">全能图片 G2 已上线 · 体验更快更清爽</div>
      <div class="top-right">
        <div class="pill">开始创作</div>
        <div class="icon-dot"></div>
        <div class="icon-dot"></div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="side-group">
          <button class="item" :class="{active: nav==='首页'}" @click="nav='首页'">首页</button>
          <button class="item" :class="{active: nav==='热门'}" @click="nav='热门'">热门</button>
          <button class="item" :class="{active: nav==='AI 应用'}" @click="nav='AI 应用'">AI 应用</button>
          <button class="item" :class="{active: nav==='模型资产'}" @click="nav='模型资产'">模型资产</button>
          <button class="item" :class="{active: nav==='工作流'}" @click="nav='工作流'">工作流</button>
          <button class="item" :class="{active: nav==='视频'}" @click="nav='视频'">视频</button>
          <button class="item" :class="{active: nav==='创作中心'}" @click="nav='创作中心'">创作中心</button>
        </div>

        <div class="side-group" style="margin-top:10px;">
          <button class="item" :class="{active: nav==='API'}" @click="nav='API'">API</button>
          <button class="item" :class="{active: nav==='会员中心'}" @click="nav='会员中心'">会员中心</button>
          <button class="item" :class="{active: nav==='个人中心'}" @click="nav='个人中心'">个人中心</button>
        </div>

        <div class="workspace-btn">我的空间</div>
      </aside>

      <main class="main">
        <section class="section">
          <div class="section-title">推荐应用</div>
          <div class="apps-grid recommend-grid">
            <article class="mini-card clickable" @click="openCanvas()">
              <div>
                <h4>数字人</h4>
                <p>真人 / 动漫口型同步，一键生成成片</p>
              </div>
              <div class="thumb"><img src="https://rh-images.xiaoyaoyou.com/system/144386_8.png" alt="数字人应用封面" /></div>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="section-title">全部应用</div>
          <div class="tags" id="all-tags">
            <span class="tag" v-for="tag in tags" :key="tag.key" :class="{active: activeTag===tag.key}" @click="activeTag=tag.key">{{tag.label}}</span>
          </div>

          <template v-if="activeTag==='workflow'">
            <div class="cards">
              <article class="card clickable" @click="openCanvas()">
                <div class="cover"><img src="https://rh-images.xiaoyaoyou.com/system/144386_8.png" alt="数字人工作流封面" /></div>
                <div class="meta">数字人</div>
              </article>
              <article class="card clickable" @click="openPosWorkflow()">
                <div class="cover"><img src="https://rh-images.xiaoyaoyou.com/c2d9dec685f25fab12df85d62cfcdc31/output/ComfyUI_00001_obkeh_1776322552.png?imageMogr2/format/webp/rquality/60/ignore-error/1/minisize/1" alt="穿搭大师POS工作流封面" /></div>
                <div class="meta">穿搭大师POS工作流</div>
              </article>
            </div>
          </template>

          <template v-else>
            <div class="mock-grid">
              <article
                class="mock-card"
                v-for="feature in currentFeatures"
                :key="feature.key"
                :class="{active: selectedFeature && selectedFeature.key===feature.key}"
                @click="selectFeature(feature)">
                <div class="mock-card-title">{{ feature.title }}</div>
                <div class="mock-card-desc">{{ feature.desc }}</div>
              </article>
            </div>

            <div class="mock-panel" v-if="selectedFeature">
              <h4>{{ selectedFeature.title }}</h4>
              <p>{{ selectedFeature.detail }}</p>
              <div class="mock-actions">
                <button class="mock-btn" type="button" @click="fakeAction('预览')">预览</button>
                <button class="mock-btn" type="button" @click="fakeAction('立即使用')">立即使用</button>
                <button class="mock-btn" type="button" @click="fakeAction('收藏')">收藏</button>
              </div>
            </div>

            <div class="empty-pane" v-else></div>
          </template>
        </section>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          searchText: '搜索应用 / 工作流 / 模型',
          nav: 'AI 应用',
          activeTag: 'workflow',
          selectedFeature: null,
          tags: [
            { key: 'workflow', label: '工作流' },
            { key: 'new', label: '新人必试' },
            { key: 'image', label: '图片工具' },
            { key: 'video', label: '视频工具' },
            { key: 'copy', label: '文案' },
            { key: 'commerce', label: '电商' },
            { key: 'training', label: '模型训练' },
            { key: 'api', label: 'API' },
            { key: 'anime', label: '动漫' },
            { key: 'more', label: '更多' }
          ],
          mockFeaturesMap: {
            new: [
              { key: 'new-1', title: '一键口播', desc: '输入文案，自动生成口播视频。', detail: '这是演示功能：可快速体验文案到口播的视频生成流程。' },
              { key: 'new-2', title: '智能抠图', desc: '上传图片，秒级完成抠图。', detail: '这是演示功能：支持人像与商品图抠图，结果可直接下载。' },
              { key: 'new-3', title: '图文转短视频', desc: '图文素材自动拼接成片。', detail: '这是演示功能：系统会自动匹配转场、字幕与背景音乐。' }
            ],
            image: [
              { key: 'img-1', title: '海报生成器', desc: '多风格电商海报一键生成。', detail: '这是演示功能：支持简约、科技、节日等多种视觉模板。' },
              { key: 'img-2', title: '图片增强', desc: '模糊图像自动修复清晰。', detail: '这是演示功能：可进行降噪、超分辨率和色彩增强。' },
              { key: 'img-3', title: 'AI 商品换背景', desc: '自动生成高质量商品场景。', detail: '这是演示功能：可快速替换纯色背景与生活化场景。' }
            ],
            video: [
              { key: 'vd-1', title: '爆款剪辑助手', desc: '自动识别高光片段并剪辑。', detail: '这是演示功能：可智能识别停顿、口误并自动裁切。' },
              { key: 'vd-2', title: 'AI 字幕精修', desc: '一键生成并优化字幕样式。', detail: '这是演示功能：支持双语字幕、关键字高亮和模板套用。' },
              { key: 'vd-3', title: '数字人播报', desc: '输入稿件即可生成播报视频。', detail: '这是演示功能：包含多形象、多语速和表情动作模板。' }
            ],
            copy: [
              { key: 'cp-1', title: '标题生成器', desc: '自动生成高点击标题。', detail: '这是演示功能：支持小红书、抖音、电商等场景标题。' },
              { key: 'cp-2', title: '脚本助手', desc: '生成短视频分镜和旁白。', detail: '这是演示功能：可按时长自动拆分镜头与台词节奏。' },
              { key: 'cp-3', title: '营销文案优化', desc: '强化转化率与表达力。', detail: '这是演示功能：可输出不同语气和人群定向版本。' }
            ],
            commerce: [
              { key: 'ec-1', title: '商品详情页助手', desc: '自动生成卖点与排版结构。', detail: '这是演示功能：支持 3C、美妆、服饰等常见电商类目。' },
              { key: 'ec-2', title: '客服回复机器人', desc: '自动回复常见售前售后问题。', detail: '这是演示功能：可按店铺话术风格统一回复口径。' },
              { key: 'ec-3', title: '活动页快速搭建', desc: '快速生成大促活动页面。', detail: '这是演示功能：可一键套用模板并自动填充商品信息。' }
            ],
            training: [
              { key: 'tr-1', title: '风格模型训练', desc: '上传素材训练专属风格。', detail: '这是演示功能：支持插画、产品渲染和人物风格训练。' },
              { key: 'tr-2', title: 'LoRA 管理台', desc: '管理与测试你的模型资产。', detail: '这是演示功能：支持模型版本管理与效果对比。' },
              { key: 'tr-3', title: '数据集清洗', desc: '自动打标与筛除低质样本。', detail: '这是演示功能：可批量执行质量检测与标签修正。' }
            ],
            api: [
              { key: 'ap-1', title: '文本生成 API', desc: '提供标准化文案生成接口。', detail: '这是演示功能：支持参数配置、速率限制和调用统计展示。' },
              { key: 'ap-2', title: '图像生成 API', desc: '将生图能力接入业务系统。', detail: '这是演示功能：支持同步/异步调用与任务状态查询。' },
              { key: 'ap-3', title: '语音合成 API', desc: '快速接入 TTS 语音能力。', detail: '这是演示功能：可配置音色、语速和情感风格。' }
            ],
            anime: [
              { key: 'an-1', title: '二次元头像工坊', desc: '一键生成动漫头像。', detail: '这是演示功能：支持多种画风与角色设定组合。' },
              { key: 'an-2', title: '漫画分镜生成', desc: '自动生成剧情分镜草稿。', detail: '这是演示功能：支持单页与多格分镜快速输出。' },
