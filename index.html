<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIHub - AI 应用</title>
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #e8eefb;
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --line: rgba(107, 123, 152, 0.16);
      --text: #0f1728;
      --muted: #677489;
      --primary: #3a7bff;
      --shadow: 0 14px 34px rgba(28, 40, 68, 0.10);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --top-h: 68px;
      --left-w: 230px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 620px at -8% -10%, rgba(158, 196, 255, 0.42), transparent 56%),
        radial-gradient(980px 560px at 105% -18%, rgba(204, 182, 255, 0.30), transparent 58%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: var(--top-h) minmax(0, 1fr);
      gap: 14px;
      padding: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      padding: 10px 14px;
    }

    .top-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .search {
      width: min(420px, 45vw);
      min-width: 140px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(124, 138, 164, 0.22);
      background: rgba(255, 255, 255, 0.72);
      color: #344054;
      font-size: 14px;
      padding: 0 14px;
      outline: none;
    }

    .search:focus {
      border-color: rgba(47, 107, 255, 0.36);
      box-shadow: 0 0 0 3px rgba(47, 107, 255, 0.12);
    }

    .hero-chip {
      justify-self: center;
      border: 1px solid rgba(99, 115, 142, 0.2);
      background: rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: #344054;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 46vw;
    }

    .top-right {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill {
      border: 1px solid rgba(47, 107, 255, 0.26);
      border-radius: 999px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      font-size: 13px;
      color: #1f4fd1;
      background: rgba(255, 255, 255, 0.85);
      font-weight: 600;
    }

    .icon-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(123, 136, 162, 0.24);
      background: rgba(255, 255, 255, 0.85);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--left-w) minmax(0, 1fr);
      gap: 14px;
    }

    .sidebar {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      min-height: 0;
      overflow: auto;
    }

    .side-group {
      display: grid;
      gap: 6px;
    }

    .item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: #475467;
      font-size: 14px;
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      transition: .15s ease;
    }

    .item:hover {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(123, 136, 162, 0.18);
    }

    .item.active {
      color: #12358f;
      border-color: rgba(47, 107, 255, 0.24);
      background: linear-gradient(145deg, rgba(210, 227, 255, 0.82), rgba(233, 240, 255, 0.92));
      font-weight: 600;
    }

    .workspace-btn {
      margin-top: 10px;
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: #475467;
      font-size: 13px;
      padding: 10px 0;
      text-align: center;
    }

    .main {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 4px;
    }

    .section {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass-strong);
      backdrop-filter: blur(16px) saturate(128%);
      -webkit-backdrop-filter: blur(16px) saturate(128%);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .recommend-grid {
      grid-template-columns: minmax(260px, 380px);
      justify-content: start;
    }

    .mini-card {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.82);
      min-height: 94px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      padding: 12px 12px 12px 14px;
    }

    .clickable {
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .clickable:hover {
      transform: translateY(-1px);
      border-color: rgba(47, 107, 255, 0.25);
      box-shadow: 0 10px 24px rgba(18, 44, 96, 0.14);
    }

    .mini-card h4 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #101828;
      line-height: 1.2;
    }

    .mini-card p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #667085;
      line-height: 1.35;
    }

    .thumb {
      width: 86px;
      height: 62px;
      border-radius: 12px;
      border: 1px solid rgba(123, 136, 162, 0.2);
      overflow: hidden;
      background: #edf2ff;
      flex-shrink: 0;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      border: 1px solid rgba(123, 136, 162, 0.22);
      background: rgba(255, 255, 255, 0.8);
      color: #667085;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      transition: .15s ease;
    }

    .tag.active {
      color: #1748bf;
      border-color: rgba(47, 107, 255, 0.28);
      background: rgba(222, 234, 255, 0.9);
      font-weight: 600;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid rgba(123, 136, 162, 0.22);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
    }

    .cover {
      aspect-ratio: 3 / 4;
      background: #eef3ff;
      overflow: hidden;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      padding: 10px;
      font-size: 13px;
      color: #475467;
      line-height: 1.3;
      font-weight: 600;
    }

    .empty-pane {
      min-height: 230px;
      border: 1px dashed rgba(123, 136, 162, 0.32);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5);
    }

    .hidden { display: none !important; }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 88px minmax(0, 1fr); }
      .item { font-size: 12px; padding: 10px 8px; }
      .workspace-btn { font-size: 12px; }
    }

    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .hero-chip { justify-self: start; max-width: 100%; }
      .top-right { justify-self: start; }
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        flex-direction: row;
        overflow-x: auto;
        gap: 10px;
        align-items: center;
      }
      .side-group { display: flex; gap: 6px; }
      .workspace-btn { display: none; }
    }

    @media (max-width: 520px) {
      .brand { display: none; }
      .search { width: 100%; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-left">
        <div class="brand">AIHub</div>
        <input class="search" value="搜索应用 / 工作流 / 模型" />
      </div>
      <div class="hero-chip">全能图片 G2 已上线 · 体验更快更清爽</div>
      <div class="top-right">
        <div class="pill">开始创作</div>
        <div class="icon-dot"></div>
        <div class="icon-dot"></div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="side-group">
          <button class="item">首页</button>
          <button class="item">热门</button>
          <button class="item active">AI 应用</button>
          <button class="item">模型资产</button>
          <button class="item">工作流</button>
          <button class="item">视频</button>
          <button class="item">创作中心</button>
        </div>

        <div class="side-group" style="margin-top:10px;">
          <button class="item">API</button>
          <button class="item">会员中心</button>
          <button class="item">个人中心</button>
        </div>

        <div class="workspace-btn">我的空间</div>
      </aside>

      <main class="main">
        <section class="section">
          <div class="section-title">推荐应用</div>
          <div class="apps-grid recommend-grid">
            <article class="mini-card clickable" data-open-canvas="digital-human">
              <div>
                <h4>数字人</h4>
                <p>真人 / 动漫口型同步，一键生成成片</p>
              </div>
              <div class="thumb"><img src="https://rh-images.xiaoyaoyou.com/system/144386_8.png" alt="数字人应用封面" /></div>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="section-title">全部应用</div>
          <div class="tags" id="all-tags">
            <span class="tag active" data-key="workflow">工作流</span>
            <span class="tag" data-key="new">新人必试</span>
            <span class="tag" data-key="image">图片工具</span>
            <span class="tag" data-key="video">视频工具</span>
            <span class="tag" data-key="copy">文案</span>
            <span class="tag" data-key="commerce">电商</span>
            <span class="tag" data-key="training">模型训练</span>
            <span class="tag" data-key="api">API</span>
            <span class="tag" data-key="anime">动漫</span>
            <span class="tag" data-key="more">更多</span>
          </div>

          <div class="cards" data-pane="workflow">
            <article class="card clickable" data-open-canvas="digital-human">
              <div class="cover"><img src="https://rh-images.xiaoyaoyou.com/system/144386_8.png" alt="数字人工作流封面" /></div>
              <div class="meta">数字人</div>
            </article>
          </div>

          <div class="empty-pane hidden" data-pane="new"></div>
          <div class="empty-pane hidden" data-pane="image"></div>
          <div class="empty-pane hidden" data-pane="video"></div>
          <div class="empty-pane hidden" data-pane="copy"></div>
          <div class="empty-pane hidden" data-pane="commerce"></div>
          <div class="empty-pane hidden" data-pane="training"></div>
          <div class="empty-pane hidden" data-pane="api"></div>
          <div class="empty-pane hidden" data-pane="anime"></div>
          <div class="empty-pane hidden" data-pane="more"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const tagsWrap = document.getElementById('all-tags');
      const openCards = Array.from(document.querySelectorAll('[data-open-canvas="digital-human"]'));

      openCards.forEach((card) => {
        card.addEventListener('click', () => {
          window.location.href = './workflow-canvas.html';
        });
      });

      if (!tagsWrap) return;

      const tags = Array.from(tagsWrap.querySelectorAll('.tag'));
      const panes = Array.from(document.querySelectorAll('[data-pane]'));

      function showPane(key) {
        tags.forEach((tag) => {
          tag.classList.toggle('active', tag.dataset.key === key);
        });

        panes.forEach((pane) => {
          pane.classList.toggle('hidden', pane.dataset.pane !== key);
        });
      }

      tags.forEach((tag) => {
        tag.addEventListener('click', () => showPane(tag.dataset.key));
      });

      showPane('workflow');
    })();
  </script>
</body>
</html>
