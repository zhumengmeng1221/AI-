<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简洁工作流 - 文生图/文生音频/图+音频生视频</title>
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #e8eefb;
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --line: rgba(107, 123, 152, 0.16);
      --text: #0f1728;
      --muted: #677489;
      --primary: #3a7bff;
      --shadow: 0 14px 34px rgba(28, 40, 68, 0.10);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 620px at -8% -10%, rgba(158, 196, 255, 0.42), transparent 56%),
        radial-gradient(980px 560px at 105% -18%, rgba(204, 182, 255, 0.30), transparent 58%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }
    .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; gap: 12px; padding: 12px; }
    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      padding: 14px 12px;
    }
    .menu { display: grid; gap: 6px; }
    .menu button {
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: #475467;
      font-size: 14px;
      transition: .15s ease;
    }
    .menu button:hover { background: rgba(255,255,255,.72); border-color: rgba(123,136,162,.18); }
    .menu button.active {
      color: #12358f;
      border-color: rgba(47,107,255,.24);
      background: linear-gradient(145deg, rgba(210,227,255,.82), rgba(233,240,255,.92));
      font-weight: 600;
    }
    .main { padding: 6px; }
    .title { font-size: 30px; font-weight: 700; margin: 6px 4px; }
    .sub { color: var(--muted); margin: 0 4px 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--glass-strong);
      backdrop-filter: blur(16px) saturate(128%);
      -webkit-backdrop-filter: blur(16px) saturate(128%);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .step { font-size: 12px; color: #565f6b; font-weight: 700; margin-bottom: 10px; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .drop {
      min-height: 220px;
      border: 1px dashed #d9dde4;
      border-radius: 14px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #8b93a1;
      padding: 14px;
      background: #fafbfc;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      cursor: zoom-in;
    }
    .drop b { color: #404854; display: block; margin-top: 6px; }
    .ctrl-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .pill { padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; font-size: 12px; color: #555d69; background: #fff; }
    .right { margin-left: auto; }
    .btn {
      border: 1px solid #000;
      background: #000;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.light { background: #fff; color: #111; border-color: #d8dce3; }
    .file { display: none; }
    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      outline: none;
      resize: vertical;
    }
    .muted { color: #7e8796; font-size: 13px; }
    .status { margin-top: 10px; font-size: 13px; color: #4a5360; }
    audio { width: 100%; margin-top: 8px; }

    .preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .preview-modal.open { display: flex; }
    .preview-modal img {
      max-width: min(96vw, 1600px);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      background: #111;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .upload-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="menu">
        <button class="active" data-panel="p-image">文生图</button>
        <button data-panel="p-audio">文生音频</button>
        <button data-panel="p-video">图+音频生视频</button>
      </div>
    </aside>

    <main class="main">
      <div class="title">一站式高品质数字人</div>
      <div class="sub">先生成图和音频，再一键合成视频。若已有上游结果，会自动填充到视频节点。</div>

      <section class="card panel active" id="p-image">
        <div class="step">01 文生图</div>
        <textarea id="imgPrompt" placeholder="输入文生图提示词"></textarea>
        <div class="ctrl-row">
          <span class="pill" id="imgState">未生成</span>
          <button class="btn right" id="imgGenBtn">生成图片</button>
        </div>
        <div class="drop" id="imgResultBox">🖼<b>生成结果会显示在这里</b></div>
        <div class="status" id="imgStatus">状态：READY</div>
      </section>

      <section class="card panel" id="p-audio">
        <div class="step">02 文生音频</div>
        <textarea id="audioPrompt" placeholder="输入文生音频文案"></textarea>
        <div class="ctrl-row" style="margin-top:8px;">
          <label class="btn light" for="refAudio">上传参考音频(可选)</label>
          <input class="file" id="refAudio" type="file" accept="audio/*,.mp3,.wav,.flac" />
          <span class="muted" id="refAudioName">未选择参考音频</span>
        </div>
        <div class="ctrl-row">
          <span class="pill" id="audioState">未生成</span>
          <button class="btn right" id="audioGenBtn">生成音频</button>
        </div>
        <audio id="audioPreview" controls></audio>
        <div class="status" id="audioStatus">状态：READY</div>
      </section>

      <section class="card panel" id="p-video">
        <div class="step">03 图+音频生视频</div>
        <div class="upload-grid">
          <div>
            <div class="drop" id="videoImageBox">🖼<b>上传商品图 / 或自动使用文生图结果</b></div>
            <div class="ctrl-row">
              <label class="btn light" for="videoImage">上传图片</label>
              <input class="file" id="videoImage" type="file" accept="image/*" />
              <span class="muted" id="videoImageName">未选择图片</span>
            </div>
          </div>
          <div>
            <div class="drop" id="videoAudioBox">🎵<b>上传音频 / 或自动使用文生音频结果</b></div>
            <div class="ctrl-row">
              <label class="btn light" for="videoAudio">上传音频</label>
              <input class="file" id="videoAudio" type="file" accept="audio/*,.mp3,.wav,.flac" />
              <span class="muted" id="videoAudioName">未选择音频</span>
            </div>
          </div>
        </div>
        <div class="ctrl-row">
          <span class="pill" id="videoState">等待生成</span>
          <button class="btn right" id="videoGenBtn">生成视频</button>
        </div>
        <div class="status" id="videoStatus">taskId: -</div>
      </section>
    </main>
  </div>

  <div class="preview-modal" id="previewModal">
    <img id="previewModalImg" alt="预览大图" />
  </div>

  <script>
    (function () {
      const RH = {
        baseUrl: 'https://www.runninghub.cn',
        uploadPath: '/task/openapi/upload',
        createPath: '/task/openapi/create',
        outputsPath: '/task/openapi/outputs',

        workflowId: '2044669894783934465',
        imageNodeId: '133',
        imageFieldName: 'image',
        audioNodeId: '125',
        audioFieldName: 'audio',

        imageWorkflowId: '2047014805009080321',
        imagePromptNodeId: '100',
        imagePromptFieldName: 'text',

        ttsWorkflowId: '2046420823195525122',
        ttsPromptNodeId: '47',
        ttsPromptFieldName: 'prompt',
        ttsRefAudioNodeId: '46',
        ttsRefAudioFieldName: 'audio',

        apiKey: '6b0b6ac3b887416992eed10fe8b77d65'
      };

      let generatedImageUrl = '';
      let generatedAudioUrl = '';

      const panelBtns = Array.from(document.querySelectorAll('.menu button'));
      const panels = Array.from(document.querySelectorAll('.panel'));
      panelBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          panelBtns.forEach((x) => x.classList.toggle('active', x === btn));
          const id = btn.dataset.panel;
          panels.forEach((p) => p.classList.toggle('active', p.id === id));
        });
      });

      const imgPrompt = document.getElementById('imgPrompt');
      const imgGenBtn = document.getElementById('imgGenBtn');
      const imgResultBox = document.getElementById('imgResultBox');
      const imgState = document.getElementById('imgState');
      const imgStatus = document.getElementById('imgStatus');

      const audioPrompt = document.getElementById('audioPrompt');
      const refAudio = document.getElementById('refAudio');
      const refAudioName = document.getElementById('refAudioName');
      const audioGenBtn = document.getElementById('audioGenBtn');
      const audioPreview = document.getElementById('audioPreview');
      const audioState = document.getElementById('audioState');
      const audioStatus = document.getElementById('audioStatus');

      const videoImage = document.getElementById('videoImage');
      const videoAudio = document.getElementById('videoAudio');
      const videoImageName = document.getElementById('videoImageName');
      const videoAudioName = document.getElementById('videoAudioName');
      const videoImageBox = document.getElementById('videoImageBox');
      const videoAudioBox = document.getElementById('videoAudioBox');
      const videoGenBtn = document.getElementById('videoGenBtn');
      const previewModal = document.getElementById('previewModal');
      const previewModalImg = document.getElementById('previewModalImg');
      const videoState = document.getElementById('videoState');
      const videoStatus = document.getElementById('videoStatus');
      let latestVideoUrls = [];

      function getApiKey() {
        return (localStorage.getItem('runninghub_api_key') || RH.apiKey || '').trim();
      }

      function openPreview(src) {
        if (!src || !previewModal || !previewModalImg) return;
        previewModalImg.src = src;
        previewModal.classList.add('open');
      }

      function closePreview() {
        if (!previewModal || !previewModalImg) return;
        previewModal.classList.remove('open');
        previewModalImg.removeAttribute('src');
      }

      async function parseJsonSafe(resp) {
        const text = await resp.text();
        try { return JSON.parse(text); } catch (_) { return { raw: text }; }
      }

      async function uploadFileToRunningHub(file) {
        const key = getApiKey();
        if (!key) throw new Error('缺少 API Key');
        const form = new FormData();
        form.append('file', file);
        form.append('apiKey', key);
        form.append('fileType', 'input');
        const res = await fetch(`${RH.baseUrl}${RH.uploadPath}`, {
          method: 'POST', headers: { Authorization: `Bearer ${key}` }, body: form
        });
        const data = await parseJsonSafe(res);
        if (!res.ok) throw new Error(`上传失败(${res.status}) ${JSON.stringify(data)}`);
        return data?.data?.fileName || data?.data?.filename || data?.data?.download_url || data?.data?.downloadUrl || '';
      }

      async function createTaskOnRunningHub({ workflowId, nodeInfoList }) {
        const key = getApiKey();
        const res = await fetch(`${RH.baseUrl}${RH.createPath}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
          body: JSON.stringify({ apiKey: key, workflowId, nodeInfoList })
        });
        const data = await parseJsonSafe(res);
        if (!res.ok || data?.code !== 0) throw new Error(`创建任务失败: ${JSON.stringify(data)}`);
        return data?.data?.taskId || data?.taskId || '';
      }

      async function pollOutputs(taskId) {
        const key = getApiKey();
        for (let i = 0; i < 120; i++) {
          const res = await fetch(`${RH.baseUrl}${RH.outputsPath}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
            body: JSON.stringify({ apiKey: key, taskId })
          });
          const data = await parseJsonSafe(res);
          if (!res.ok) throw new Error(`查询失败(${res.status})`);
          if (data?.code === 0 && Array.isArray(data?.data) && data.data.length > 0) {
            const urls = [];
            (function walk(x) {
              if (!x) return;
              if (typeof x === 'string' && /^https?:\/\//i.test(x)) { urls.push(x); return; }
              if (Array.isArray(x)) x.forEach(walk);
              else if (typeof x === 'object') Object.values(x).forEach(walk);
            })(data);

            const videos = urls.filter((u) => /\.(mp4|mov|mkv|webm)(\?|$)/i.test(u));
            const list = videos.length ? videos : urls;
            return { raw: data, urls: list };
          }
          if (data?.code === 805) throw new Error(`任务失败: ${JSON.stringify(data)}`);
          await new Promise((r) => setTimeout(r, 3000));
        }
        throw new Error('轮询超时');
      }

      async function runWorkflowV2(workflowId, nodeInfoList = []) {
        const key = getApiKey();
        const res = await fetch(`${RH.baseUrl}/openapi/v2/run/workflow/${encodeURIComponent(workflowId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
          body: JSON.stringify({ addMetadata: true, nodeInfoList, instanceType: 'default', usePersonalQueue: false })
        });
        const data = await parseJsonSafe(res);
        if (!res.ok || !data?.taskId) throw new Error(`v2创建失败: ${JSON.stringify(data)}`);
        return data.taskId;
      }

      async function pollOutputsV2(taskId) {
        const key = getApiKey();
        for (let i = 0; i < 120; i++) {
          const res = await fetch(`${RH.baseUrl}/openapi/v2/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
            body: JSON.stringify({ taskId })
          });
          const data = await parseJsonSafe(res);
          if (!res.ok) throw new Error(`v2查询失败(${res.status})`);
          const status = String(data?.status || '').toUpperCase();
          if (status === 'SUCCESS') return (data?.results || []).map((r) => r?.url).filter(Boolean);
          if (status === 'FAILED') throw new Error(`v2任务失败: ${data?.errorMessage || JSON.stringify(data)}`);
          await new Promise((r) => setTimeout(r, 3000));
        }
        throw new Error('v2轮询超时');
      }

      refAudio.addEventListener('change', () => {
        const f = refAudio.files && refAudio.files[0];
        refAudioName.textContent = f ? f.name : '未选择参考音频';
      });

      videoImage.addEventListener('change', () => {
        const f = videoImage.files && videoImage.files[0];
        videoImageName.textContent = f ? f.name : '未选择图片';
        if (!f) return;
        const url = URL.createObjectURL(f);
        videoImageBox.style.backgroundImage = `url(${url})`;
        videoImageBox.innerHTML = '';
      });

      videoAudio.addEventListener('change', () => {
        const f = videoAudio.files && videoAudio.files[0];
        videoAudioName.textContent = f ? f.name : '未选择音频';
      });

      [imgResultBox, videoImageBox].forEach((box) => {
        box.addEventListener('dblclick', () => {
          const bg = box.style.backgroundImage || '';
          const m = bg.match(/url\(["']?(.*?)["']?\)/);
          if (m && m[1]) openPreview(m[1]);
        });
      });

      if (previewModal) {
        previewModal.addEventListener('click', (e) => {
          if (e.target === previewModal) closePreview();
        });
      }

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePreview();
      });

      imgGenBtn.addEventListener('click', async () => {
        const prompt = (imgPrompt.value || '').trim();
        if (!prompt) return alert('请先输入文生图提示词');
        imgGenBtn.disabled = true;
        imgState.textContent = '生成中';
        imgStatus.textContent = '状态：RUNNING';
        try {
          const taskId = await runWorkflowV2(RH.imageWorkflowId, [{ nodeId: RH.imagePromptNodeId, fieldName: RH.imagePromptFieldName, fieldValue: prompt }]);
          const urls = await pollOutputsV2(taskId);
          const imageUrl = urls.find((u) => /\.(png|jpe?g|webp|gif)(\?|$)/i.test(u)) || urls[0] || '';
          if (!imageUrl) throw new Error('未获取到图片URL');
          generatedImageUrl = imageUrl;
          imgResultBox.style.backgroundImage = `url(${imageUrl})`;
          imgResultBox.innerHTML = '';
          imgState.textContent = '已生成';
          imgStatus.textContent = `状态：SUCCESS，taskId=${taskId}`;
          videoImageName.textContent = '已自动填充(来自文生图)';
          videoImageBox.style.backgroundImage = `url(${imageUrl})`;
          videoImageBox.innerHTML = '';
        } catch (e) {
          alert(`文生图失败：${e.message || e}`);
          imgState.textContent = '失败';
          imgStatus.textContent = '状态：FAILED';
        } finally {
          imgGenBtn.disabled = false;
        }
      });

      audioGenBtn.addEventListener('click', async () => {
        const prompt = (audioPrompt.value || '').trim();
        if (!prompt) return alert('请先输入文生音频文案');
        audioGenBtn.disabled = true;
        audioState.textContent = '生成中';
        audioStatus.textContent = '状态：RUNNING';
        try {
          let refValue = '';
          const f = refAudio.files && refAudio.files[0];
          if (f) refValue = await uploadFileToRunningHub(f);
          const nodeInfoList = [
            { nodeId: RH.ttsPromptNodeId, fieldName: RH.ttsPromptFieldName, fieldValue: prompt },
            ...(refValue ? [{ nodeId: RH.ttsRefAudioNodeId, fieldName: RH.ttsRefAudioFieldName, fieldValue: refValue }] : [])
          ];
          const taskId = await runWorkflowV2(RH.ttsWorkflowId, nodeInfoList);
          const urls = await pollOutputsV2(taskId);
          const audioUrl = urls.find((u) => /\.(mp3|wav|flac|m4a|aac|ogg)(\?|$)/i.test(u)) || urls[0] || '';
          if (!audioUrl) throw new Error('未获取到音频URL');
          generatedAudioUrl = audioUrl;
          audioPreview.src = audioUrl;
          audioState.textContent = '已生成';
          audioStatus.textContent = `状态：SUCCESS，taskId=${taskId}`;
          videoAudioName.textContent = '已自动填充(来自文生音频)';
          videoAudioBox.innerHTML = '🎵<b>已自动填充音频，可直接生成视频</b>';
        } catch (e) {
          alert(`文生音频失败：${e.message || e}`);
          audioState.textContent = '失败';
          audioStatus.textContent = '状态：FAILED';
        } finally {
          audioGenBtn.disabled = false;
        }
      });

      videoGenBtn.addEventListener('click', async () => {
        videoGenBtn.disabled = true;
        videoState.textContent = '处理中';
        try {
          let imageUrl = generatedImageUrl;
          let audioUrl = generatedAudioUrl;

          const imgFile = videoImage.files && videoImage.files[0];
          const audFile = videoAudio.files && videoAudio.files[0];

          if (!imageUrl && imgFile) imageUrl = await uploadFileToRunningHub(imgFile);
          if (!audioUrl && audFile) audioUrl = await uploadFileToRunningHub(audFile);

          if (!imageUrl) throw new Error('请上传图片，或先生成文生图');

          const taskId = await createTaskOnRunningHub({
            workflowId: RH.workflowId,
            nodeInfoList: [
              { nodeId: RH.imageNodeId, fieldName: RH.imageFieldName, fieldValue: imageUrl },
              ...(audioUrl ? [{ nodeId: RH.audioNodeId, fieldName: RH.audioFieldName, fieldValue: audioUrl }] : [])
            ]
          });
          videoStatus.textContent = `taskId: ${taskId}`;
          const out = await pollOutputs(taskId);
          latestVideoUrls = out?.urls || [];
          const firstVideo = latestVideoUrls.find((u) => /\.(mp4|mov|mkv|webm)(\?|$)/i.test(u));
          if (firstVideo) {
            videoAudioBox.innerHTML = `<video src="${firstVideo}" controls style="width:100%;max-height:220px;border-radius:10px;background:#0b0c0f;"></video>`;
          }
          videoState.textContent = '已完成';
        } catch (e) {
          alert(`图+音频生视频失败：${e.message || e}`);
          videoState.textContent = '失败';
        } finally {
          videoGenBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
